<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSC Cruises and Microsoft: From Daily Report to Daily Decision</title>
<meta name="description" content="A point of view for MSC Cruises on the simplest path to natural-language, action-ready intelligence over the daily corporate performance report." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --ink:#000033;
    --navy:#000E55;
    --navy-2:#011E41;
    --navy-soft:#0A2472;
    --blue:#1B3A8F;
    --orange:#FF690E;
    --orange-deep:#F25600;
    --orange-soft:#FF8A42;
    --slate:#44546A;
    --paper:#FFFFFF;
    --paper-2:#F4F6FA;
    --paper-3:#EAEEF5;
    --line:#E5E7EB;
    --line-dark:rgba(255,255,255,.14);
    --shadow:0 24px 60px -30px rgba(0,0,51,.5);
    --shadow-sm:0 12px 32px -20px rgba(0,0,51,.45);
    --display:'Montserrat',system-ui,-apple-system,Segoe UI,sans-serif;
    --body:'Open Sans',system-ui,-apple-system,Segoe UI,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--body);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:var(--orange);color:#fff}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1160px;margin:0 auto;padding:0 28px}
  h1,h2,h3,h4,.display{font-family:var(--display)}

  /* ---- Top bar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:15px 32px;backdrop-filter:blur(14px);background:rgba(0,0,51,.55);border-bottom:1px solid var(--line-dark);
    transition:background .4s ease}
  .topbar.solid{background:rgba(0,0,51,.94)}
  .brandmark{display:flex;align-items:center;gap:13px;color:#fff}
  .wordmark{display:flex;flex-direction:column;line-height:1}
  .wordmark .w1{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:1px;color:#fff}
  .wordmark .w2{font-family:var(--display);font-weight:600;font-size:10px;letter-spacing:5px;text-transform:uppercase;color:var(--orange);margin-top:3px}
  .topnav{display:flex;gap:28px;align-items:center}
  .topnav a{color:rgba(255,255,255,.82);font-size:13px;font-weight:600;letter-spacing:.2px;transition:color .25s}
  .topnav a:hover{color:var(--orange-soft)}
  .topnav .ms{font-size:11px;letter-spacing:.8px;text-transform:uppercase;color:rgba(255,255,255,.55);padding-left:24px;border-left:1px solid var(--line-dark)}
  @media(max-width:860px){.topnav a:not(.ms){display:none}}

  /* ---- Hero ---- */
  .hero{position:relative;min-height:100vh;display:flex;align-items:center;color:#fff;overflow:hidden;
    background:radial-gradient(130% 100% at 78% -10%,#0A2472 0%,#000E55 40%,#000033 100%)}
  .hero .glow{position:absolute;width:620px;height:620px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,105,14,.20),transparent 64%);top:-160px;right:-130px;filter:blur(6px)}
  .hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line-dark) 1px,transparent 1px),linear-gradient(90deg,var(--line-dark) 1px,transparent 1px);
    background-size:62px 62px;mask-image:radial-gradient(120% 80% at 50% 0%,#000 0%,transparent 70%);opacity:.55}
  .waves{position:absolute;bottom:-2px;left:0;width:100%;height:170px;opacity:.6}
  .hero-inner{position:relative;z-index:2;padding:118px 0 96px}
  .eyebrow{display:inline-flex;align-items:center;gap:11px;font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--orange-soft);font-weight:700;margin-bottom:24px}
  .eyebrow::before{content:"";width:32px;height:2px;background:var(--orange)}
  .hero h1{font-weight:800;font-size:clamp(38px,6vw,76px);line-height:1.04;letter-spacing:-1px;max-width:15ch}
  .hero h1 .o{color:var(--orange)}
  .hero .spine{margin-top:24px;font-family:var(--display);font-weight:600;font-size:clamp(17px,2vw,23px);color:#fff;max-width:30ch;line-height:1.3}
  .hero .spine .o{color:var(--orange-soft)}
  .hero .lede{margin-top:22px;max-width:58ch;font-size:clamp(15px,1.6vw,18px);color:rgba(255,255,255,.8);font-weight:300}
  .hero .cta{margin-top:38px;display:flex;gap:14px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:4px;font-family:var(--display);font-weight:700;font-size:14px;letter-spacing:.3px;transition:transform .25s,box-shadow .25s,background .25s;cursor:pointer;border:none}
  .btn-orange{background:var(--orange);color:#fff;box-shadow:0 14px 32px -14px rgba(255,105,14,.8)}
  .btn-orange:hover{transform:translateY(-3px);background:var(--orange-deep);box-shadow:0 20px 42px -14px rgba(255,105,14,.9)}
  .btn-ghost{background:transparent;color:#fff;border:1px solid rgba(255,255,255,.3)}
  .btn-ghost:hover{border-color:var(--orange);color:var(--orange-soft)}
  .hero-meta{position:absolute;bottom:32px;left:0;width:100%;z-index:2}
  .hero-meta .row{display:flex;gap:38px;flex-wrap:wrap;font-size:12.5px;color:rgba(255,255,255,.6);letter-spacing:.3px}
  .hero-meta .row b{color:var(--orange-soft);font-weight:700}

  /* ---- Section scaffolding ---- */
  section{padding:92px 0;position:relative}
  .sec-label{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;font-weight:800;color:var(--orange-deep);margin-bottom:15px;font-family:var(--display)}
  .sec-title{font-family:var(--display);font-weight:800;font-size:clamp(28px,3.7vw,46px);line-height:1.1;letter-spacing:-.6px;color:var(--navy)}
  .sec-title.light{color:#fff}
  .sec-intro{margin-top:18px;max-width:64ch;font-size:17.5px;color:var(--slate);font-weight:400}
  .sec-intro.light{color:rgba(255,255,255,.78)}
  .reveal{opacity:0;transform:translateY(26px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  /* ---- Vision / quotes ---- */
  .listened{background:var(--paper)}
  .quote-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:46px}
  @media(max-width:760px){.quote-grid{grid-template-columns:1fr}}
  .qcard{background:var(--paper-2);border:1px solid var(--line);border-radius:8px;padding:30px;position:relative;overflow:hidden}
  .qcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--orange)}
  .qcard .qmark{font-family:var(--display);font-size:54px;line-height:.5;color:var(--orange);opacity:.32;height:24px}
  .qcard p{font-family:var(--display);font-weight:600;font-size:20px;line-height:1.35;color:var(--navy)}
  .qcard .src{margin-top:15px;font-size:11.5px;letter-spacing:1.2px;text-transform:uppercase;color:var(--slate);font-weight:700}

  /* ---- Principle ---- */
  .principle{background:linear-gradient(180deg,var(--paper) 0%,var(--paper-2) 100%)}
  .split{display:grid;grid-template-columns:1.05fr .95fr;gap:54px;align-items:center;margin-top:38px}
  @media(max-width:860px){.split{grid-template-columns:1fr;gap:34px}}
  .principle .lead{font-family:var(--display);font-weight:600;font-size:clamp(22px,2.7vw,30px);line-height:1.28;color:var(--navy)}
  .principle .lead b{color:var(--orange-deep);font-weight:700}
  .principle .body{margin-top:20px;font-size:16px;color:var(--slate)}
  .vs{border:1px solid var(--line);border-radius:10px;overflow:hidden;box-shadow:var(--shadow-sm);background:#fff}
  .vs-row{display:flex;align-items:flex-start;gap:15px;padding:22px 24px;border-bottom:1px solid var(--line)}
  .vs-row:last-child{border-bottom:none}
  .vs-row.bad{background:#fff6f3}
  .vs-row.good{background:#f0f9f4}
  .vs-ic{flex:0 0 28px;height:28px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff;font-family:var(--display)}
  .vs-row.bad .vs-ic{background:#d4502f}
  .vs-row.good .vs-ic{background:#1f9d5a}
  .vs-row h4{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .vs-row p{font-size:13.5px;color:var(--slate)}

  /* ---- Spine band: deterministic facts, AI judgment ---- */
  .spine-band{background:radial-gradient(120% 130% at 50% -10%,#0A2472,#000E55 48%,#000033);color:#fff;position:relative;overflow:hidden}
  .spine-band .glow{position:absolute;width:540px;height:540px;border-radius:50%;background:radial-gradient(circle,rgba(255,105,14,.16),transparent 62%);top:-200px;left:-120px}
  .spine-headline{position:relative;z-index:2;text-align:center;max-width:900px;margin:0 auto}
  .spine-headline h2{font-family:var(--display);font-weight:800;font-size:clamp(26px,3.6vw,42px);line-height:1.16;letter-spacing:-.5px}
  .spine-headline h2 .o{color:var(--orange)}
  .spine-headline p{margin-top:18px;font-size:17px;color:rgba(255,255,255,.76);font-weight:300;max-width:60ch;margin-left:auto;margin-right:auto}
  .does-grid{position:relative;z-index:2;margin-top:52px;display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  @media(max-width:880px){.does-grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:520px){.does-grid{grid-template-columns:1fr}}
  .does-card{border:1px solid var(--line-dark);border-radius:10px;padding:24px 22px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));transition:transform .35s,border-color .35s}
  .does-card:hover{transform:translateY(-4px);border-color:rgba(255,105,14,.5)}
  .does-card .tag{font-size:10.5px;letter-spacing:1.5px;text-transform:uppercase;font-weight:800;font-family:var(--display)}
  .does-card.no .tag{color:#ff9a9a}
  .does-card.yes .tag{color:var(--orange-soft)}
  .does-card h4{font-family:var(--display);font-size:16px;font-weight:700;margin:10px 0 6px}
  .does-card p{font-size:13.5px;color:rgba(255,255,255,.72);font-weight:300}

  /* ---- OOTB ethos ---- */
  .ethos{background:var(--paper)}
  .ethos-grid{margin-top:46px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}
  @media(max-width:780px){.ethos-grid{grid-template-columns:1fr}}
  .ecard{border:1px solid var(--line);border-radius:10px;padding:28px 26px;background:var(--paper-2);transition:transform .35s,box-shadow .35s}
  .ecard:hover{transform:translateY(-5px);box-shadow:var(--shadow-sm)}
  .ecard .ei{font-family:var(--display);font-weight:800;font-size:15px;color:#fff;background:var(--orange);width:38px;height:38px;border-radius:9px;display:grid;place-items:center}
  .ecard h4{font-family:var(--display);font-size:17px;font-weight:700;color:var(--navy);margin:16px 0 8px}
  .ecard p{font-size:14.5px;color:var(--slate)}
  .ethos-line{margin-top:38px;text-align:center;font-family:var(--display);font-size:clamp(17px,2vw,22px);font-weight:600;color:var(--navy)}
  .ethos-line b{color:var(--orange-deep);font-weight:700}

  /* ---- Architecture ---- */
  .arch{background:radial-gradient(120% 100% at 50% 0%,#0A2472,#000E55 50%,#000033);color:#fff}
  .arch-stack{margin-top:50px;display:flex;flex-direction:column;gap:16px;max-width:920px;margin-left:auto;margin-right:auto}
  .layer{position:relative;border:1px solid var(--line-dark);border-radius:12px;padding:30px 32px;background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));transition:transform .4s cubic-bezier(.2,.7,.2,1),border-color .4s,box-shadow .4s}
  .layer:hover{transform:translateY(-4px);border-color:rgba(255,105,14,.55);box-shadow:0 30px 60px -32px rgba(0,0,0,.7)}
  .layer .ltag{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:800;color:var(--orange-soft);font-family:var(--display)}
  .layer .lhead{display:flex;align-items:baseline;gap:13px;flex-wrap:wrap;margin-top:8px}
  .layer h3{font-family:var(--display);font-size:26px;font-weight:700}
  .layer .lprod{font-size:13px;color:var(--orange-soft);font-weight:700;font-family:var(--display)}
  .layer p{margin-top:10px;color:rgba(255,255,255,.78);font-size:15px;font-weight:300;max-width:72ch}
  .layer .chips{margin-top:16px;display:flex;gap:9px;flex-wrap:wrap}
  .chip{font-size:12px;padding:6px 13px;border-radius:40px;border:1px solid var(--line-dark);color:rgba(255,255,255,.85);background:rgba(255,255,255,.04);font-weight:500}
  .conn{display:grid;place-items:center;color:var(--orange);font-size:20px;opacity:.8;height:6px}
  .layer-num{position:absolute;top:22px;right:28px;font-family:var(--display);font-size:50px;color:rgba(255,105,14,.2);font-weight:800;line-height:1}
  .foundation-note{margin:38px auto 0;max-width:780px;text-align:center;font-size:15px;color:rgba(255,255,255,.72);font-weight:300}
  .foundation-note b{color:var(--orange-soft);font-weight:700}

  /* ---- Investigation demo ---- */
  .act{background:var(--paper-2)}
  .demo{margin-top:46px;display:grid;grid-template-columns:.82fr 1.18fr;gap:30px;align-items:stretch}
  @media(max-width:880px){.demo{grid-template-columns:1fr}}
  .qpicker{display:flex;flex-direction:column;gap:11px}
  .qbtn{text-align:left;padding:18px 20px;border-radius:9px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:var(--body);font-size:15px;font-weight:600;color:var(--navy);transition:all .25s;box-shadow:var(--shadow-sm)}
  .qbtn:hover{border-color:var(--orange)}
  .qbtn.active{background:var(--navy);color:#fff;border-color:var(--navy);transform:translateX(5px)}
  .qbtn .qk{display:block;font-family:var(--display);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--orange-deep);font-weight:800;margin-bottom:5px}
  .qbtn.active .qk{color:var(--orange-soft)}
  .screen{background:#fff;border:1px solid var(--line);border-radius:14px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:500px}
  .screen-bar{display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.08)}
  .dot{width:10px;height:10px;border-radius:50%}
  .screen-bar .title{margin-left:12px;color:rgba(255,255,255,.72);font-size:12px;letter-spacing:.6px;font-weight:600;font-family:var(--display)}
  .screen-body{padding:24px 26px;flex:1;display:flex;flex-direction:column;gap:14px}
  .bubble{max-width:90%;padding:13px 17px;border-radius:14px;font-size:14.5px;line-height:1.5}
  .bubble.user{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:4px;animation:rise .4s both}
  .investigate{align-self:stretch}
  .inv-label{font-family:var(--display);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--slate);font-weight:800;display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .inv-label .spin{width:13px;height:13px;border:2px solid var(--line);border-top-color:var(--orange);border-radius:50%;animation:spin .8s linear infinite}
  .inv-label.done .spin{border:2px solid var(--orange);border-top-color:var(--orange);animation:none}
  @keyframes spin{to{transform:rotate(360deg)}}
  .pull{display:flex;align-items:center;gap:12px;padding:11px 15px;border:1px solid var(--line);border-radius:9px;background:var(--paper-2);margin-bottom:8px;animation:rise .45s both}
  .pull .pk{flex:0 0 16px;height:16px;border-radius:50%;background:#1f9d5a;display:grid;place-items:center;color:#fff;font-size:9px;font-weight:800}
  .pull .pq{flex:1;font-size:13.5px;color:var(--slate);font-weight:500}
  .pull .pv{font-family:var(--display);font-weight:800;font-size:14px;color:var(--navy);white-space:nowrap}
  .pull .pv.neg{color:#d4502f}.pull .pv.pos{color:#1f9d5a}
  .pull .src-tag{font-size:9.5px;color:var(--orange-deep);font-weight:700;letter-spacing:.4px;text-transform:uppercase;margin-top:2px;display:block}
  .insight{margin-top:4px;padding:18px 20px;border-radius:12px;border:1px solid rgba(255,105,14,.35);background:linear-gradient(135deg,rgba(255,105,14,.08),rgba(255,138,66,.04));animation:rise .5s both}
  .insight .il{font-family:var(--display);font-size:11px;letter-spacing:1.3px;text-transform:uppercase;color:var(--orange-deep);font-weight:800;margin-bottom:7px}
  .insight p{font-size:14.5px;color:var(--ink);line-height:1.5}
  .actions{margin-top:auto;display:flex;gap:9px;flex-wrap:wrap;padding-top:14px;border-top:1px dashed var(--line)}
  .act-pill{display:inline-flex;align-items:center;gap:7px;font-family:var(--display);font-size:12.5px;font-weight:700;color:#fff;padding:9px 15px;border-radius:40px;background:var(--orange);animation:rise .5s both}
  .act-pill:nth-child(2){background:var(--navy)}
  .act-pill:nth-child(3){background:var(--slate)}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .act-caption{margin-top:14px;font-size:12.5px;color:var(--slate)}
  .act-caption b{color:var(--orange-deep);font-weight:700}

  /* ---- Pilot ---- */
  .pilot{background:linear-gradient(180deg,var(--paper-2),var(--paper))}
  .pillars{margin-top:46px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
  @media(max-width:760px){.pillars{grid-template-columns:1fr}}
  .pillar{background:#fff;border:1px solid var(--line);border-radius:10px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:transform .35s,box-shadow .35s}
  .pillar:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  .pillar .pn{font-family:var(--display);font-size:15px;font-weight:800;color:#fff;background:var(--navy);width:40px;height:40px;border-radius:10px;display:grid;place-items:center;margin-bottom:18px}
  .pillar h4{font-family:var(--display);font-size:18px;font-weight:700;color:var(--navy);margin-bottom:9px}
  .pillar p{font-size:14.5px;color:var(--slate)}
  .kpi{margin-top:46px;background:var(--ink);border-radius:14px;padding:44px;display:flex;align-items:center;gap:30px;flex-wrap:wrap;justify-content:space-between;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;right:-50px;top:-50px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(255,105,14,.28),transparent 66%)}
  .kpi .ktext{position:relative;z-index:2}
  .kpi .ksm{font-family:var(--display);font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--orange-soft);font-weight:800;margin-bottom:10px}
  .kpi .kbig{font-family:var(--display);font-size:clamp(22px,2.7vw,32px);color:#fff;font-weight:700;line-height:1.22;max-width:24ch}
  .kpi .kbig b{color:var(--orange-soft)}

  /* ---- Roadmap ---- */
  .road{background:var(--paper)}
  .tabs{margin-top:42px;display:flex;gap:10px;flex-wrap:wrap}
  .tab{padding:12px 22px;border-radius:40px;border:1px solid var(--line);background:#fff;cursor:pointer;font-family:var(--display);font-weight:700;font-size:14px;color:var(--navy);transition:all .25s}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .tab .ph{font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:var(--orange-deep);display:block;font-weight:800}
  .tab.active .ph{color:var(--orange-soft)}
  .panel{margin-top:28px;background:var(--paper-2);border:1px solid var(--line);border-radius:12px;padding:38px 40px}
  .panel h3{font-family:var(--display);font-size:28px;color:var(--navy);font-weight:700;margin-bottom:6px}
  .panel .ptag{font-family:var(--display);font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:var(--orange-deep);font-weight:800;margin-bottom:16px}
  .panel ul{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:13px 30px;margin-top:8px}
  @media(max-width:680px){.panel ul{grid-template-columns:1fr}}
  .panel li{display:flex;gap:12px;font-size:15px;color:var(--slate)}
  .panel li::before{content:"";flex:0 0 8px;height:8px;border-radius:50%;background:var(--orange);margin-top:8px}

  /* ---- Closing / footer ---- */
  .closing{background:radial-gradient(120% 130% at 50% -20%,#0A2472,#000E55 46%,#000033);color:#fff;text-align:center;padding:108px 0}
  .closing h2{font-family:var(--display);font-size:clamp(30px,4.6vw,54px);font-weight:800;line-height:1.06;max-width:20ch;margin:0 auto;letter-spacing:-.5px}
  .closing h2 .o{color:var(--orange)}
  .closing p{margin:24px auto 0;max-width:54ch;color:rgba(255,255,255,.8);font-size:17.5px;font-weight:300}
  .closing .cta{margin-top:38px;display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
  footer{background:var(--ink);color:rgba(255,255,255,.6);padding:38px 0;font-size:12.5px}
  .foot-row{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
  .foot-row .fbrand{display:flex;flex-direction:column;line-height:1}
  .foot-row .fbrand .f1{font-family:var(--display);font-weight:800;font-size:16px;letter-spacing:.8px;color:#fff}
  .foot-row .fbrand .f2{font-family:var(--display);font-weight:600;font-size:9px;letter-spacing:4px;text-transform:uppercase;color:var(--orange);margin-top:3px}
  .disc{margin-top:18px;font-size:11px;color:rgba(255,255,255,.36);max-width:82ch;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef} = React;

function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.13});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  });
}

function TopBar(){
  const [solid,setSolid]=useState(false);
  useEffect(()=>{
    const f=()=>setSolid(window.scrollY>40);
    window.addEventListener('scroll',f);return ()=>window.removeEventListener('scroll',f);
  },[]);
  return (
    <div className={"topbar"+(solid?" solid":"")}>
      <div className="brandmark">
        <div className="wordmark">
          <span className="w1">MSC</span>
          <span className="w2">Cruises</span>
        </div>
      </div>
      <nav className="topnav">
        <a href="#vision">Your Vision</a>
        <a href="#principle">The Principle</a>
        <a href="#spine">Facts and Judgment</a>
        <a href="#architecture">Architecture</a>
        <a href="#act">The Investigation</a>
        <a href="#pilot">The Pilot</a>
        <span className="ms">With Microsoft</span>
      </nav>
    </div>
  );
}

function Hero(){
  return (
    <header className="hero" id="top">
      <div className="glow"></div>
      <div className="hero-grid"></div>
      <div className="wrap hero-inner">
        <div className="eyebrow">A Point of View, prepared for MSC Cruises</div>
        <h1>From the daily report to the <span className="o">daily decision.</span></h1>
        <div className="spine">The model owns the numbers. The <span className="o">AI owns the questions</span>, the connections, and the next step.</div>
        <p className="lede">
          Your executives open a large Excel file twice a day and read tab after tab to find the story in the numbers.
          Here is the simplest path to a different morning. They ask in plain language, get an answer they can trust,
          and act on it in the same breath.
        </p>
        <div className="cta">
          <a className="btn btn-orange" href="#principle">See the approach</a>
          <a className="btn btn-ghost" href="#act">Watch the investigation</a>
        </div>
      </div>
      <svg className="waves" viewBox="0 0 1440 170" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 84 C 240 28 480 140 720 84 C 960 28 1200 140 1440 84 L1440 170 L0 170 Z" fill="rgba(255,105,14,.10)"/>
        <path d="M0 112 C 280 64 520 158 760 112 C 1000 64 1220 150 1440 112 L1440 170 L0 170 Z" fill="rgba(255,255,255,.05)"/>
      </svg>
      <div className="hero-meta">
        <div className="wrap">
          <div className="row">
            <span>Use case: <b>Executive performance reporting</b></span>
            <span>Data: <b>Daily, 5 to 10 years of history</b></span>
            <span>Goal: <b>Natural language, faster insight</b></span>
            <span>Posture: <b>Start simple, expand with confidence</b></span>
          </div>
        </div>
      </div>
    </header>
  );
}

function Vision(){
  const quotes=[
    {t:"A very specific data set that arrives on a daily basis. Consistent, and historical going back at least five years, maybe even ten.",s:"The data you already trust"},
    {t:"The routine is to open an Excel file and read through multiple tabs of data.",s:"Today's morning ritual"},
    {t:"They start from a number, then try to drill down to understand the root cause.",s:"How your executives think"},
    {t:"Bring a little of the future into the present. Interact with this data through natural language and get more insights, faster.",s:"Where you want to go"},
  ];
  return (
    <section className="listened" id="vision">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">What you told us</div>
          <h2 className="sec-title">We listened first. Here is your<br/>vision, in your own words.</h2>
          <p className="sec-intro">The goal was to understand the workflow you live in, not the one a slide assumes. Four things came through clearly.</p>
        </div>
        <div className="quote-grid">
          {quotes.map((q,i)=>(
            <div className="qcard reveal" key={i} style={{transitionDelay:(i*80)+'ms'}}>
              <div className="qmark">&ldquo;</div>
              <p>{q.t}</p>
              <div className="src">{q.s}</div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Principle(){
  return (
    <section className="principle" id="principle">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">The Principle</div>
          <h2 className="sec-title">The simplest version of this<br/>is also the most powerful.</h2>
        </div>
        <div className="split">
          <div className="reveal">
            <p className="lead">
              The instinct is to point an AI at the big spreadsheet and let it read. With a report this large,
              and an audience of <b>fifteen-year domain experts</b>, that path breaks on the one thing that matters most.
              The number has to be right, every time.
            </p>
            <p className="body">
              This is not a "read the document" problem. It is a structured-data problem. Your report is consistent,
              repeatable, and already produced from source tables. So the AI does not re-read a spreadsheet. It reasons
              over the trusted numbers directly. One small foundation removes the fragility, and it does something bigger.
              It makes the AI's insight safe to believe.
            </p>
          </div>
          <div className="vs reveal" style={{transitionDelay:'110ms'}}>
            <div className="vs-row bad">
              <div className="vs-ic">&times;</div>
              <div><h4>AI reads the Excel file directly</h4><p>Token limits on a huge multi-tab file, math it can mis-add, no reliable time comparisons. The first wrong figure ends the trust.</p></div>
            </div>
            <div className="vs-row good">
              <div className="vs-ic">&#10003;</div>
              <div><h4>AI reasons over a governed model</h4><p>The answer is the certified number. Determinism is not a limit on the AI. It is the foundation that makes the AI's reasoning safe to trust.</p></div>
            </div>
          </div>
        </div>
      </div>
    </section>
  );
}

function SpineBand(){
  const cards=[
    {k:"no",t:"It never",h:"Calculates your numbers",p:"The certified model computes every figure. The AI never does the math, so it cannot quietly get it wrong."},
    {k:"yes",t:"It does",h:"Plan the investigation",p:"One executive question becomes many precise pulls. The AI decides which numbers to fetch and fetches each one."},
    {k:"yes",t:"It does",h:"Reason over the results",p:"It spots the concentration, connects it across time, and tells you what actually matters. Insight, not arithmetic."},
    {k:"yes",t:"It does",h:"Take the next step",p:"Summarise, share, flag, draft the note. The answer is the start of the work, not the end of it."},
  ];
  return (
    <section className="spine-band" id="spine">
      <div className="glow"></div>
      <div className="wrap">
        <div className="spine-headline reveal">
          <h2>Deterministic facts. <span className="o">AI judgment.</span></h2>
          <p>The AI never calculates your numbers. It investigates with them, reasons over them, and acts on them. That is the difference between a chatbot and an analyst.</p>
        </div>
        <div className="does-grid">
          {cards.map((c,i)=>(
            <div className={"does-card reveal "+c.k} key={i} style={{transitionDelay:(i*90)+'ms'}}>
              <span className="tag">{c.t}</span>
              <h4>{c.h}</h4>
              <p>{c.p}</p>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

function Ethos(){
  const cards=[
    {i:"01",h:"Start with what is already in the box",p:"Use out-of-the-box capability first. No custom build to prove a simple idea. Value in days, not quarters, on tools your team already has."},
    {i:"02",h:"Earn trust with accurate value",p:"Fast only counts if it is right. Every number is proven against your certified data before anyone relies on it. Accuracy is how adoption is won."},
    {i:"03",h:"Expand only when it earns the move",p:"If a richer surface is worth it later, you move to it in Phase 2 or 3. Because the foundation is shared, there is usually nothing to rebuild."}
  ];
  return (
    <section className="ethos" id="ethos">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">How we approach it</div>
          <h2 className="sec-title">Start out-of-the-box. Prove the value.<br/>Then expand, without starting over.</h2>
        </div>
        <div className="ethos-grid">
          {cards.map((c,i)=>(
            <div className="ecard reveal" key={i} style={{transitionDelay:(i*90)+'ms'}}>
              <div className="ei">{c.i}</div>
              <h4>{c.h}</h4>
              <p>{c.p}</p>
            </div>
          ))}
        </div>
        <div className="ethos-line reveal">Quick time to value. But the <b>right value, and accurate value</b>, because that is what earns your people's trust.</div>
      </div>
    </section>
  );
}

function Architecture(){
  return (
    <section className="arch" id="architecture">
      <div className="wrap">
        <div className="reveal" style={{textAlign:'center',maxWidth:'760px',margin:'0 auto'}}>
          <div className="sec-label" style={{color:'var(--orange-soft)'}}>The Architecture</div>
          <h2 className="sec-title light">Two layers. One of them<br/>you mostly already have.</h2>
          <p className="sec-intro light" style={{margin:'18px auto 0'}}>No sprawling rebuild. A trusted foundation, and an experience that meets your people where they already work.</p>
        </div>
        <div className="arch-stack">
          <div className="layer reveal">
            <div className="layer-num">01</div>
            <div className="ltag">The Trust Layer, Foundation</div>
            <div className="lhead"><h3>A governed Power BI and Fabric semantic model</h3><span className="lprod">In your Microsoft tenant, ready for Fabric IQ</span></div>
            <p>A governed semantic model, published in your Microsoft tenant, points at the source tables that already produce your report, not the Excel export. Every metric is defined once, certified, and consistent. Because it lives where Fabric IQ and Cowork can reach it, the experience layer reasons over certified numbers directly. Scope it to the questions that matter, not the entire report.</p>
            <div className="chips"><span className="chip">Certified metrics</span><span className="chip">5 to 10 years of history, queryable</span><span className="chip">Permissions respected</span><span className="chip">In your Microsoft tenant, reachable by the AI</span></div>
          </div>
          <div className="conn">&#9660;</div>
          <div className="layer reveal" style={{transitionDelay:'110ms'}}>
            <div className="layer-num">02</div>
            <div className="ltag">The Experience Layer, Answer and Act</div>
            <div className="lhead"><h3>Cowork, with Fabric IQ</h3><span className="lprod">The surface you are already exploring</span></div>
            <p>Your team is already experimenting with Cowork. Connect it to the trusted model, and executives ask in natural language, get certified answers, then keep going. Summarise it, share it, flag what changed, open a follow-up. It is out-of-the-box, with no custom agent to stand up first.</p>
            <div className="chips"><span className="chip">Natural-language Q&amp;A</span><span className="chip">In Teams or the web</span><span className="chip">Answer to action</span><span className="chip">Ready for more data sources</span></div>
          </div>
        </div>
        <p className="foundation-note reveal">
          The quiet advantage. <b>A simple chatbot and a full action platform need the same foundation.</b>
          Build it once, de-risk the pilot, and unlock everything in Phase 2 without redoing the hard part.
        </p>
      </div>
    </section>
  );
}

function Investigation(){
  const scenarios=[
    {
      k:"Diagnose", q:"Why are Italy bookings soft this morning?",
      pulls:[
        {q:"Italy total, today vs last year", v:"-8.4%", t:"neg"},
        {q:"Broken down by segment", v:"Med 7-night -14%", t:"neg"},
        {q:"Source-market contribution to the gap", v:"2 markets = 80%", t:""},
        {q:"Same cut, last week", v:"-7.9%", t:"neg"},
      ],
      insight:"The drop sits in one Mediterranean 7-night segment, and two source markets explain most of it. The same pattern showed up last week, so this looks like a developing trend, not a one-day blip. Worth watching.",
      actions:["Summarise for 5pm","Share to leadership","Flag segment to watch"]
    },
    {
      k:"Compare", q:"How does this week compare to last year, by region?",
      pulls:[
        {q:"Total, this week vs last year", v:"+3.1%", t:"pos"},
        {q:"Leading regions", v:"N. Europe, Caribbean", t:""},
        {q:"Trailing regions", v:"2 regions soft", t:"neg"},
        {q:"Gap contribution by region", v:"ranked", t:""},
      ],
      insight:"The week is up 3.1% overall, carried by Northern Europe and the Caribbean. Two regions are trailing and pulling the average down. The strength is real, but it is narrow, so the headline number hides where the pressure is.",
      actions:["Export regional table","Draft the exec note","Alert if it widens"]
    },
    {
      k:"Drill in", q:"What is driving the strong North America numbers?",
      pulls:[
        {q:"North America, today vs last year", v:"+11.6%", t:"pos"},
        {q:"Leading categories", v:"Premium suites", t:""},
        {q:"Itinerary length mix", v:"Longer shift", t:""},
        {q:"Repeat-guest share vs last year", v:"Up", t:"pos"},
      ],
      insight:"North America is up 11.6%, concentrated in premium suites and longer itineraries. Repeat-guest share is up versus last year, which is lifting average ticket value across the board. This is mix and loyalty, not a one-off promotion.",
      actions:["Brief the commercial team","Save as weekly view","Find similar markets"]
    }
  ];
  const [i,setI]=useState(0);
  const [step,setStep]=useState(0);
  const timers=useRef([]);
  const s=scenarios[i];
  const total=s.pulls.length;

  useEffect(()=>{
    timers.current.forEach(clearTimeout); timers.current=[];
    setStep(0);
    for(let n=1;n<=total+2;n++){
      timers.current.push(setTimeout(()=>setStep(n), 520*n));
    }
    return ()=>{ timers.current.forEach(clearTimeout); };
  },[i,total]);

  const pullsDone = Math.min(step, total);
  const showInsight = step >= total+1;
  const showActions = step >= total+2;

  return (
    <section className="act" id="act">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">The Investigation</div>
          <h2 className="sec-title">One question. Many certified pulls.<br/>One answer you can act on.</h2>
          <p className="sec-intro">A dashboard answers and stops. Watch the AI plan the investigation, pull each number from the certified model, reason over the results, and hand you the next step. Pick a question.</p>
        </div>
        <div className="demo">
          <div className="qpicker reveal">
            {scenarios.map((sc,idx)=>(
              <button key={idx} className={"qbtn"+(idx===i?" active":"")} onClick={()=>setI(idx)}>
                <span className="qk">{sc.k}</span>{sc.q}
              </button>
            ))}
          </div>
          <div className="screen reveal" style={{transitionDelay:'110ms'}}>
            <div className="screen-bar">
              <span className="dot" style={{background:'#ff5f57'}}></span>
              <span className="dot" style={{background:'#febc2e'}}></span>
              <span className="dot" style={{background:'#28c840'}}></span>
              <span className="title">Cowork, reasoning over Fabric IQ</span>
            </div>
            <div className="screen-body" key={i}>
              <div className="bubble user">{s.q}</div>
              <div className="investigate">
                <div className={"inv-label"+(pullsDone>=total?" done":"")}>
                  <span className="spin"></span>
                  {pullsDone>=total ? "Pulled "+total+" certified figures from the model" : "Investigating, pulling certified figures"}
                </div>
                {s.pulls.slice(0,pullsDone).map((p,n)=>(
                  <div className="pull" key={n}>
                    <span className="pk">&#10003;</span>
                    <span className="pq">{p.q}<span className="src-tag">Certified - Fabric IQ</span></span>
                    <span className={"pv "+(p.t)}>{p.v}</span>
                  </div>
                ))}
              </div>
              {showInsight && (
                <div className="insight">
                  <div className="il">AI insight, reasoning over the certified figures</div>
                  <p>{s.insight}</p>
                </div>
              )}
              {showActions && (
                <div className="actions">
                  {s.actions.map((a,n)=>(
                    <span className="act-pill" key={n} style={{animationDelay:(n*90)+'ms'}}>{a}</span>
                  ))}
                </div>
              )}
            </div>
          </div>
        </div>
        <p className="act-caption reveal">Illustrative interaction. <b>Every figure is a certified pull from the model.</b> The AI plans, reasons, and acts. It never invents a number.</p>
      </div>
    </section>
  );
}

function Pilot(){
  const pillars=[
    {n:"1",h:"Start with your top questions",p:"Capture the 10 to 20 questions your executives ask each morning, and model only what answers them. Narrow, fast, grounded in your real workflow."},
    {n:"2",h:"Prove the numbers first",p:"Before anything else, validate that every answer matches your certified figures across time. Trust is the product, earned on your real data, not a demo."},
    {n:"3",h:"Tune in the open",p:"You expect to tinker, so do we. Short loops, your feedback, visible progress. It will not be perfect on day one, and it is not meant to be."}
  ];
  return (
    <section className="pilot" id="pilot">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">The Pilot</div>
          <h2 className="sec-title">Small, honest, and measured by<br/>one thing that matters.</h2>
          <p className="sec-intro">You said you are eager to start experimenting as soon as next week. Here is the shape of a pilot that earns trust instead of demanding it.</p>
        </div>
        <div className="pillars">
          {pillars.map((p,i)=>(
            <div className="pillar reveal" key={i} style={{transitionDelay:(i*80)+'ms'}}>
              <div className="pn">{p.n}</div>
              <h4>{p.h}</h4>
              <p>{p.p}</p>
            </div>
          ))}
        </div>
        <div className="kpi reveal">
          <div className="ktext">
            <div className="ksm">The one success metric</div>
            <div className="kbig">Your executives open <b>the AI</b> before they open the spreadsheet.</div>
          </div>
          <a className="btn btn-orange" href="#close">Where this goes next</a>
        </div>
      </div>
    </section>
  );
}

function Roadmap(){
  const phases=[
    {ph:"Phase 1",h:"Your daily report, answered and actioned",tag:"The pilot, proven on what you have, out-of-the-box",items:["Natural-language Q&A over the certified daily report","Year-over-year and period comparisons","Drill from a number to its root cause","Summarise and share in Teams","Answer in seconds, not tabs"]},
    {ph:"Phase 2",h:"More questions, more sources, same surface",tag:"Expand once trust is established, nothing to rebuild",items:["Competitor and market data","Customer satisfaction signals","Contact-centre analytics","\"Why are we underperforming versus competitors?\"","Cross-source reasoning in one place"]},
    {ph:"Phase 3",h:"From insight to standing intelligence",tag:"The compounding return",items:["Proactive alerts when numbers move","Auto-drafted morning and evening briefs","Trends surfaced before you ask","Decisions captured and followed up","A team that starts the day informed"]}
  ];
  const [i,setI]=useState(0);
  const p=phases[i];
  return (
    <section className="road" id="road">
      <div className="wrap">
        <div className="reveal">
          <div className="sec-label">The Roadmap</div>
          <h2 className="sec-title">Earn Phase 1. Unlock the rest<br/>without starting over.</h2>
          <p className="sec-intro">Because the foundation is shared, expansion is addition, never a rebuild. You start out-of-the-box, and you are never trapped by the simple start.</p>
        </div>
        <div className="tabs reveal">
          {phases.map((ph,idx)=>(
            <button key={idx} className={"tab"+(idx===i?" active":"")} onClick={()=>setI(idx)}>
              <span className="ph">{ph.ph}</span>{ph.h.split(',')[0]}
            </button>
          ))}
        </div>
        <div className="panel reveal" key={i}>
          <div className="ptag">{p.tag}</div>
          <h3>{p.h}</h3>
          <ul>{p.items.map((it,n)=><li key={n}>{it}</li>)}</ul>
        </div>
      </div>
    </section>
  );
}

function Closing(){
  return (
    <section className="closing" id="close">
      <div className="wrap">
        <h2>A different morning, <span className="o">starting next week.</span></h2>
        <p>One trusted foundation. An experience your team already knows. A pilot measured by a single, honest question. Did it earn the first click? We think it will.</p>
        <div className="cta">
          <a className="btn btn-orange" href="#top">Revisit the approach</a>
          <a className="btn btn-ghost" href="#pilot">See the pilot shape</a>
        </div>
      </div>
    </section>
  );
}

function Footer(){
  return (
    <footer>
      <div className="wrap">
        <div className="foot-row">
          <div className="fbrand">
            <span className="f1">MSC</span>
            <span className="f2">Cruises</span>
          </div>
          <div>Point of View, prepared with Microsoft</div>
        </div>
        <div className="disc">
          Prepared as a discussion document for MSC Cruises. Product names (Microsoft Fabric IQ, Cowork, Microsoft Teams) refer to
          Microsoft technologies, and availability and capabilities should be confirmed for your tenant and region. Interactions, figures,
          and percentages shown are illustrative examples to convey the experience and do not represent MSC Cruises data. MSC Cruises
          name and marks belong to their respective owner and are used here for identification in a partner discussion context.
        </div>
      </div>
    </footer>
  );
}

function App(){
  useReveal();
  return (
    <React.Fragment>
      <TopBar/>
      <Hero/>
      <Vision/>
      <Principle/>
      <SpineBand/>
      <Ethos/>
      <Architecture/>
      <Investigation/>
      <Pilot/>
      <Roadmap/>
      <Closing/>
      <Footer/>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
