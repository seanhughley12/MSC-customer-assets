<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSC Cruises &times; Microsoft — From Daily Report to Daily Decision</title>
<meta name="description" content="A point of view for MSC Cruises: the simplest path to natural-language, action-ready intelligence over your daily corporate performance report." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --navy-deep:#001536;
    --navy:#002E6D;
    --navy-soft:#0A3A7A;
    --blue:#0A4DA2;
    --sky:#4FA8DC;
    --gold:#C7A35A;
    --gold-light:#E4CD96;
    --gold-deep:#A6823B;
    --ink:#0B1A33;
    --paper:#F6F8FC;
    --paper-2:#EDF2F9;
    --line:rgba(11,26,51,.10);
    --line-on-dark:rgba(255,255,255,.14);
    --shadow:0 24px 60px -28px rgba(0,21,54,.45);
    --shadow-sm:0 10px 30px -18px rgba(0,21,54,.5);
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',system-ui,-apple-system,Segoe UI,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  ::selection{background:var(--gold);color:var(--navy-deep)}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1160px;margin:0 auto;padding:0 28px}

  /* ---- Top bar ---- */
  .topbar{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:16px 32px;backdrop-filter:blur(14px);background:rgba(0,21,54,.55);border-bottom:1px solid var(--line-on-dark);
    transition:background .4s ease}
  .topbar.solid{background:rgba(0,21,54,.92)}
  .brandmark{display:flex;align-items:center;gap:14px;color:#fff}
  .crest{width:38px;height:38px;border:1.5px solid var(--gold);border-radius:50%;display:grid;place-items:center;
    font-family:var(--serif);font-weight:700;font-size:14px;letter-spacing:.5px;color:var(--gold);position:relative}
  .crest::after{content:"";position:absolute;inset:4px;border-radius:50%;border:1px solid rgba(199,163,90,.4)}
  .brandtxt{display:flex;flex-direction:column;line-height:1.05}
  .brandtxt .b1{font-family:var(--serif);font-size:18px;font-weight:600;letter-spacing:3px}
  .brandtxt .b2{font-size:9.5px;letter-spacing:3.5px;text-transform:uppercase;color:var(--gold-light);font-weight:500}
  .topnav{display:flex;gap:30px;align-items:center}
  .topnav a{color:rgba(255,255,255,.8);font-size:13px;font-weight:500;letter-spacing:.3px;transition:color .25s}
  .topnav a:hover{color:var(--gold-light)}
  .topnav .ms{font-size:11px;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,.55);
    padding-left:26px;border-left:1px solid var(--line-on-dark)}
  @media(max-width:820px){.topnav a:not(.ms){display:none}}

  /* ---- Hero ---- */
  .hero{position:relative;min-height:100vh;display:flex;align-items:center;color:#fff;overflow:hidden;
    background:radial-gradient(120% 90% at 80% -10%,#0A3A7A 0%,#002E6D 38%,#001536 100%)}
  .hero .glow{position:absolute;width:680px;height:680px;border-radius:50%;
    background:radial-gradient(circle,rgba(199,163,90,.22),transparent 62%);top:-180px;right:-120px;filter:blur(8px)}
  .waves{position:absolute;bottom:-2px;left:0;width:100%;height:180px;opacity:.5}
  .hero-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line-on-dark) 1px,transparent 1px),linear-gradient(90deg,var(--line-on-dark) 1px,transparent 1px);
    background-size:64px 64px;mask-image:radial-gradient(120% 80% at 50% 0%,#000 0%,transparent 70%);opacity:.5}
  .hero-inner{position:relative;z-index:2;padding:120px 0 90px}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-size:12px;letter-spacing:3px;text-transform:uppercase;
    color:var(--gold-light);font-weight:600;margin-bottom:26px}
  .eyebrow::before{content:"";width:34px;height:1px;background:var(--gold)}
  .hero h1{font-family:var(--serif);font-weight:600;font-size:clamp(40px,6.4vw,82px);line-height:1.02;letter-spacing:-.5px;max-width:14ch}
  .hero h1 em{font-style:italic;color:var(--gold-light)}
  .hero .lede{margin-top:28px;max-width:60ch;font-size:clamp(16px,1.7vw,20px);color:rgba(255,255,255,.82);font-weight:300}
  .hero .cta{margin-top:42px;display:flex;gap:16px;flex-wrap:wrap}
  .btn{display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:2px;font-weight:600;font-size:14px;
    letter-spacing:.4px;transition:transform .25s,box-shadow .25s,background .25s;cursor:pointer;border:none}
  .btn-gold{background:linear-gradient(135deg,var(--gold-light),var(--gold));color:var(--navy-deep);box-shadow:0 14px 34px -14px rgba(199,163,90,.7)}
  .btn-gold:hover{transform:translateY(-3px);box-shadow:0 20px 44px -14px rgba(199,163,90,.85)}
  .btn-ghost{background:transparent;color:#fff;border:1px solid var(--line-on-dark)}
  .btn-ghost:hover{border-color:var(--gold);color:var(--gold-light)}
  .hero-meta{position:absolute;bottom:34px;left:0;width:100%;z-index:2}
  .hero-meta .row{display:flex;gap:40px;flex-wrap:wrap;font-size:12.5px;color:rgba(255,255,255,.6);letter-spacing:.5px}
  .hero-meta .row b{color:var(--gold-light);font-weight:600}

  /* ---- Section scaffolding ---- */
  section{padding:96px 0;position:relative}
  .sec-label{font-size:12px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--gold-deep);margin-bottom:16px}
  .sec-title{font-family:var(--serif);font-weight:600;font-size:clamp(30px,4vw,50px);line-height:1.08;letter-spacing:-.4px;color:var(--navy)}
  .sec-title.light{color:#fff}
  .sec-intro{margin-top:20px;max-width:64ch;font-size:18px;color:#3a4a63;font-weight:300}
  .sec-intro.light{color:rgba(255,255,255,.78)}
  .reveal{opacity:0;transform:translateY(28px);transition:opacity .8s cubic-bezier(.2,.7,.2,1),transform .8s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  /* ---- Listened / quotes ---- */
  .listened{background:var(--paper)}
  .quote-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:22px;margin-top:48px}
  @media(max-width:760px){.quote-grid{grid-template-columns:1fr}}
  .qcard{background:#fff;border:1px solid var(--line);border-radius:6px;padding:30px 30px 28px;position:relative;box-shadow:var(--shadow-sm);overflow:hidden}
  .qcard::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(var(--gold),var(--gold-deep))}
  .qcard .qmark{font-family:var(--serif);font-size:60px;line-height:.5;color:var(--gold);opacity:.32;height:26px}
  .qcard p{font-family:var(--serif);font-size:21px;line-height:1.35;color:var(--navy);font-weight:500}
  .qcard .src{margin-top:16px;font-size:11.5px;letter-spacing:1.5px;text-transform:uppercase;color:#8593a8;font-weight:600}

  /* ---- Principle ---- */
  .principle{background:linear-gradient(180deg,#fff 0%,var(--paper-2) 100%)}
  .split{display:grid;grid-template-columns:1.05fr .95fr;gap:56px;align-items:center;margin-top:40px}
  @media(max-width:860px){.split{grid-template-columns:1fr;gap:36px}}
  .vs{border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:var(--shadow-sm);background:#fff}
  .vs-row{display:flex;align-items:flex-start;gap:16px;padding:22px 24px;border-bottom:1px solid var(--line)}
  .vs-row:last-child{border-bottom:none}
  .vs-row.bad{background:#fcf4f2}
  .vs-row.good{background:#f1f8f3}
  .vs-ic{flex:0 0 30px;height:30px;border-radius:50%;display:grid;place-items:center;font-weight:800;font-size:15px;color:#fff}
  .vs-row.bad .vs-ic{background:#c2553f}
  .vs-row.good .vs-ic{background:#2f8f5b}
  .vs-row h4{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px}
  .vs-row p{font-size:13.5px;color:#586277}
  .principle .lead{font-family:var(--serif);font-size:clamp(24px,3vw,34px);line-height:1.25;color:var(--navy);font-weight:500}
  .principle .lead b{color:var(--gold-deep);font-weight:600;font-style:italic}
  .principle .body{margin-top:22px;font-size:16.5px;color:#3a4a63;font-weight:300}

  /* ---- OOTB philosophy band ---- */
  .ethos{background:linear-gradient(160deg,#06203f,#001536);color:#fff;position:relative;overflow:hidden}
  .ethos .glow{position:absolute;width:560px;height:560px;border-radius:50%;background:radial-gradient(circle,rgba(199,163,90,.16),transparent 62%);bottom:-220px;left:-140px}
  .ethos .e-head{max-width:760px;position:relative;z-index:2}
  .ethos .big{font-family:var(--serif);font-size:clamp(26px,3.4vw,40px);line-height:1.22;font-weight:500;margin-top:6px}
  .ethos .big b{color:var(--gold-light);font-style:italic;font-weight:600}
  .ethos-grid{margin-top:50px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px;position:relative;z-index:2}
  @media(max-width:780px){.ethos-grid{grid-template-columns:1fr}}
  .ecard{border:1px solid var(--line-on-dark);border-radius:10px;padding:28px 26px;background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));transition:transform .35s,border-color .35s}
  .ecard:hover{transform:translateY(-4px);border-color:rgba(199,163,90,.55)}
  .ecard .ei{font-family:var(--serif);font-size:30px;color:var(--gold-light);font-weight:700;line-height:1}
  .ecard h4{font-size:17px;font-weight:700;margin:14px 0 8px}
  .ecard p{font-size:14px;color:rgba(255,255,255,.75);font-weight:300}
  .ethos-line{margin-top:42px;text-align:center;position:relative;z-index:2;font-size:15px;letter-spacing:.4px;color:rgba(255,255,255,.66);font-weight:300}
  .ethos-line b{color:var(--gold-light);font-weight:600}

  /* ---- Architecture ---- */
  .arch{background:radial-gradient(120% 100% at 50% 0%,#0A3A7A,#002E6D 50%,#001536);color:#fff}
  .arch-stack{margin-top:54px;display:flex;flex-direction:column;gap:18px;max-width:920px;margin-left:auto;margin-right:auto}
  .layer{position:relative;border:1px solid var(--line-on-dark);border-radius:10px;padding:30px 32px;
    background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(255,255,255,.02));cursor:default;
    transition:transform .4s cubic-bezier(.2,.7,.2,1),border-color .4s,box-shadow .4s}
  .layer:hover{transform:translateY(-4px);border-color:rgba(199,163,90,.6);box-shadow:0 30px 60px -30px rgba(0,0,0,.6)}
  .layer .ltag{font-size:11px;letter-spacing:2.5px;text-transform:uppercase;font-weight:700;color:var(--gold-light)}
  .layer .lhead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-top:8px}
  .layer h3{font-family:var(--serif);font-size:28px;font-weight:600}
  .layer .lprod{font-size:13px;color:var(--sky);font-weight:600;letter-spacing:.3px}
  .layer p{margin-top:10px;color:rgba(255,255,255,.78);font-size:15px;font-weight:300;max-width:70ch}
  .layer .chips{margin-top:16px;display:flex;gap:10px;flex-wrap:wrap}
  .chip{font-size:12px;padding:6px 13px;border-radius:40px;border:1px solid var(--line-on-dark);color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
  .conn{display:grid;place-items:center;color:var(--gold);font-size:22px;opacity:.7;height:6px}
  .layer-num{position:absolute;top:24px;right:28px;font-family:var(--serif);font-size:54px;color:rgba(199,163,90,.22);font-weight:700;line-height:1}
  .foundation-note{margin:40px auto 0;max-width:780px;text-align:center;font-size:15px;color:rgba(255,255,255,.7);font-weight:300}
  .foundation-note b{color:var(--gold-light);font-weight:600}

  /* ---- Answer to Act ---- */
  .act{background:var(--paper)}
  .demo{margin-top:48px;display:grid;grid-template-columns:.85fr 1.15fr;gap:34px;align-items:stretch}
  @media(max-width:860px){.demo{grid-template-columns:1fr}}
  .qpicker{display:flex;flex-direction:column;gap:12px}
  .qbtn{text-align:left;padding:18px 20px;border-radius:8px;border:1px solid var(--line);background:#fff;cursor:pointer;
    font-family:var(--sans);font-size:15px;font-weight:500;color:var(--navy);transition:all .25s;box-shadow:var(--shadow-sm)}
  .qbtn:hover{border-color:var(--gold)}
  .qbtn.active{background:var(--navy);color:#fff;border-color:var(--navy);transform:translateX(6px)}
  .qbtn .qk{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-bottom:5px}
  .qbtn.active .qk{color:var(--gold-light)}
  .screen{background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;min-height:430px}
  .screen-bar{display:flex;align-items:center;gap:8px;padding:14px 18px;background:var(--navy-deep);border-bottom:1px solid rgba(255,255,255,.08)}
  .dot{width:10px;height:10px;border-radius:50%}
  .screen-bar .title{margin-left:12px;color:rgba(255,255,255,.72);font-size:12px;letter-spacing:1px;font-weight:500}
  .screen-body{padding:26px 28px;flex:1;display:flex;flex-direction:column;gap:16px}
  .bubble{max-width:88%;padding:14px 18px;border-radius:14px;font-size:14.5px;line-height:1.5;animation:rise .5s both}
  .bubble.user{align-self:flex-end;background:var(--navy);color:#fff;border-bottom-right-radius:4px}
  .bubble.ai{align-self:flex-start;background:var(--paper-2);color:var(--ink);border-bottom-left-radius:4px;border:1px solid var(--line)}
  .bubble.ai .ans-num{font-family:var(--serif);font-size:26px;color:var(--navy);font-weight:700;display:block;margin-bottom:4px}
  .bubble.ai .ans-num span{font-size:14px;color:#2f8f5b;font-weight:600}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .actions{margin-top:auto;display:flex;gap:10px;flex-wrap:wrap;padding-top:6px;border-top:1px dashed var(--line)}
  .act-pill{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;font-weight:600;color:var(--navy);
    padding:9px 14px;border-radius:40px;border:1px solid var(--gold);background:linear-gradient(135deg,rgba(228,205,150,.25),rgba(199,163,90,.12));animation:rise .6s both}
  .act-pill .agi{width:16px;height:16px;border-radius:50%;background:var(--gold);display:grid;place-items:center;color:#fff;font-size:9px;font-weight:800}
  .act-caption{margin-top:14px;font-size:12.5px;color:#7a869b;letter-spacing:.3px}
  .act-caption b{color:var(--gold-deep)}

  /* ---- Pilot ---- */
  .pilot{background:linear-gradient(180deg,var(--paper-2),#fff)}
  .pillars{margin-top:48px;display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  @media(max-width:760px){.pillars{grid-template-columns:1fr}}
  .pillar{background:#fff;border:1px solid var(--line);border-radius:8px;padding:30px 28px;box-shadow:var(--shadow-sm);transition:transform .35s,box-shadow .35s}
  .pillar:hover{transform:translateY(-5px);box-shadow:var(--shadow)}
  .pillar .pn{font-family:var(--serif);font-size:15px;font-weight:700;color:#fff;background:var(--navy);width:40px;height:40px;border-radius:50%;display:grid;place-items:center;margin-bottom:18px}
  .pillar h4{font-size:18px;font-weight:700;color:var(--navy);margin-bottom:10px}
  .pillar p{font-size:14.5px;color:#586277;font-weight:300}
  .kpi{margin-top:48px;background:var(--navy);border-radius:12px;padding:44px;display:flex;align-items:center;gap:32px;flex-wrap:wrap;justify-content:space-between;box-shadow:var(--shadow);position:relative;overflow:hidden}
  .kpi::after{content:"";position:absolute;right:-60px;top:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(199,163,90,.25),transparent 65%)}
  .kpi .ktext{position:relative;z-index:2}
  .kpi .ksm{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:var(--gold-light);font-weight:700;margin-bottom:10px}
  .kpi .kbig{font-family:var(--serif);font-size:clamp(24px,3vw,34px);color:#fff;font-weight:500;line-height:1.2;max-width:24ch}
  .kpi .kbig b{color:var(--gold-light);font-style:italic;font-weight:600}

  /* ---- Roadmap ---- */
  .road{background:var(--paper)}
  .tabs{margin-top:44px;display:flex;gap:10px;flex-wrap:wrap}
  .tab{padding:12px 22px;border-radius:40px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:600;font-size:14px;color:var(--navy);transition:all .25s}
  .tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
  .tab .ph{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold-deep);display:block;font-weight:700}
  .tab.active .ph{color:var(--gold-light)}
  .panel{margin-top:30px;background:#fff;border:1px solid var(--line);border-radius:10px;padding:38px 40px;box-shadow:var(--shadow-sm)}
  .panel h3{font-family:var(--serif);font-size:30px;color:var(--navy);font-weight:600;margin-bottom:6px}
  .panel .ptag{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep);font-weight:700;margin-bottom:16px}
  .panel ul{list-style:none;display:grid;grid-template-columns:repeat(2,1fr);gap:14px 30px;margin-top:8px}
  @media(max-width:680px){.panel ul{grid-template-columns:1fr}}
  .panel li{display:flex;gap:12px;font-size:15px;color:#3a4a63}
  .panel li::before{content:"";flex:0 0 8px;height:8px;border-radius:50%;background:var(--gold);margin-top:8px}

  /* ---- CTA / footer ---- */
  .closing{background:radial-gradient(120% 120% at 50% -20%,#0A3A7A,#002E6D 45%,#001536);color:#fff;text-align:center;padding:110px 0}
  .closing h2{font-family:var(--serif);font-size:clamp(32px,5vw,58px);font-weight:600;line-height:1.05;max-width:18ch;margin:0 auto}
  .closing h2 em{font-style:italic;color:var(--gold-light)}
  .closing p{margin:26px auto 0;max-width:56ch;color:rgba(255,255,255,.78);font-size:18px;font-weight:300}
  .closing .cta{margin-top:40px;display:flex;justify-content:center;gap:16px;flex-wrap:wrap}
  footer{background:var(--navy-deep);color:rgba(255,255,255,.6);padding:40px 0;font-size:12.5px}
  .foot-row{display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap}
  .foot-row .fbrand{display:flex;align-items:center;gap:12px;color:#fff}
  .foot-row .fbrand .b1{font-family:var(--serif);letter-spacing:2px;font-size:16px}
  .disc{margin-top:18px;font-size:11px;color:rgba(255,255,255,.35);max-width:80ch;line-height:1.6}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect} = React;

function useReveal(){
  useEffect(()=>{
    const els=document.querySelectorAll('.reveal');
    const io=new IntersectionObserver((es)=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target)}})},{threshold:.14});
    els.forEach(el=>io.observe(el));
    return ()=>io.disconnect();
  });
}

function TopBar(){
  const [solid,setSolid]=useState(false);
  useEffect(()=>{
    const f=()=>setSolid(window.scrollY>40);
    window.addEventListener('scroll',f);return ()=>window.removeEventListener('scroll',f);
  },[]);
  return (
    <div className={"topbar"+(solid?" solid":"")}>
      <div className="brandmark">
        <div className="crest">MSC</div>
        <div className="brandtxt">
          <span className="b1">MSC&nbsp;CRUISES</span>
          <span className="b2">Intelligence Point of View</span>
        </div>
      </div>
      <nav className="topnav">
        <a href="#vision">Your Vision</a>
        <a href="#principle">The Principle</a>
        <a href="#ethos">Our Approach</a>
        <a href="#architecture">Architecture</a>
        <a href="#act">Answer to Act</a>
        <a href="#pilot">The Pilot</a>
        <span className="ms">In partnership with Microsoft</span>
      </nav>
    </div>
  );
}

function Hero(){
  return (
    <header className="hero" id="top">
      <div className="glow"></div>
      <div className="hero-grid"></div>
      <div className="wrap hero-inner">
        <div className="eyebrow">A Point of View &middot; Prepared for MSC Cruises</div>
        <h1>From the Daily Report to the <em>Daily Decision.</em></h1>
        <p className="lede">
          Your executives open a large Excel file twice a day and read through tab after tab to find the
